services:
  - type: web
    name: start-relay
    runtime: image
    plan: starter
    image:
      url: ghcr.io/sasicodes/start/relay:latest
    numInstances: 1
    healthCheckPath: /health
    envVars:
      - key: START_RELAY_TOKEN
        generateValue: true
      - key: START_RELAY_PAIRING_TTL_MS
        sync: false
