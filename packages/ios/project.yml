name: Start
options:
  bundleIdPrefix: one.intelligence
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "17.0"
settings:
  base:
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
    SWIFT_VERSION: "6.0"
targets:
  Start:
    type: application
    platform: iOS
    sources:
      - Start
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Start
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        INFOPLIST_KEY_NSCameraUsageDescription: Start uses the camera to scan connection QR codes.
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        PRODUCT_BUNDLE_IDENTIFIER: one.intelligence.start.ios
        TARGETED_DEVICE_FAMILY: 1
    scheme:
      testTargets: []
